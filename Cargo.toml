[workspace]
members = [
    "crates/axhash-core",
    "crates/axhash-ffi",
    "crates/axhash-python",
    "crates/axhash-wasm"
]
resolver = "2"

[workspace.package]
version = "0.4.3"
authors = ["Bagus Dwi Harianto robbymangkualam2000@gmail.com"]
edition = "2024"
license = "MIT"
repository = "https://github.com/robby031/axhash"
description = "High-performance AxHash engine for multiple environments"

[workspace.dependencies]
axhash-core = { path = "crates/axhash-core", version = "0.4.3" }
wasm-bindgen = "0.2.120"
pyo3 = { version = "0.28.3", features = ["abi3-py39", "extension-module"] }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1

[profile.bench]
opt-level = 3
lto = "fat"
codegen-units = 1